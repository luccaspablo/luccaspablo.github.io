<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerezes - Gestão de Externos</title>
    <style>
        :root {
            --brand-black: #000000;
            --brand-gray: #f2f2f2;
            --border-color: #e0e0e0;
            --accent-red: #fee2e2;
            --accent-green: #d4edda;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background: #fff; color: #000;
            letter-spacing: 0.2px;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        header h1 { text-transform: uppercase; font-size: 1.1rem; letter-spacing: 2px; font-weight: 900; }

        nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .nav-link { 
            text-transform: uppercase; font-size: 0.7rem; font-weight: bold; 
            text-decoration: none; color: #999; padding-bottom: 5px; cursor: pointer;
        }
        .nav-link.active { color: #000; border-bottom: 2px solid #000; }

        .form-card { background: var(--brand-gray); padding: 20px; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 0.6rem; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        input, select {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            background: #fff; font-size: 0.85rem; border-radius: 0;
        }

        .conditional { display: none; background: #eee; padding: 15px; margin-top: -15px; margin-bottom: 15px; }

        .btn-black {
            background: #000; color: #fff; border: none; padding: 15px;
            width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; font-size: 0.75rem;
        }

        /* FILTROS CENTRALIZADOS */
        .filters { 
            display: flex; 
            justify-content: center; /* Centraliza os botões */
            gap: 8px; 
            margin-bottom: 25px; 
            padding: 0 10px;
        }
        .filter-btn {
            background: var(--brand-gray); border: none; padding: 6px 12px;
            font-size: 0.65rem; border-radius: 20px; white-space: nowrap; cursor: pointer;
            text-transform: uppercase; font-weight: bold; color: #666;
        }
        .filter-btn.active { background: #000; color: #fff; }

        /* LISTA EM CARDS (MOBILE & TABLET) */
        .card-item {
            background: #fff; border: 1px solid var(--border-color);
            margin-bottom: 12px; padding: 16px;
        }
        .card-row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 4px 0; border-bottom: 1px solid #f9f9f9;
        }
        .card-row:last-of-type { border-bottom: none; margin-bottom: 10px; }

        /* Ajuste de Fontes nos Cards */
        .card-label { 
            font-size: 0.65rem; /* Esquerda menor e sutil */
            font-weight: bold; 
            text-transform: uppercase; 
            color: #999; 
        }
        .card-value { 
            font-size: 0.8rem; /* Direita um pouco maior que o label, mas equilibrada */
            font-weight: 500; 
            text-align: right;
            max-width: 60%;
        }

        .badge { font-size: 0.6rem; padding: 3px 8px; font-weight: bold; text-transform: uppercase; }
        .b-fora { background: var(--accent-red); color: #991b1b; }
        .b-retorno { background: var(--accent-green); color: #155724; }

        .btn-action { 
            border: 1px solid #000; background: none; padding: 10px; 
            width: 100%; font-size: 0.7rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase;
        }
        
        .section { display: none; }
        .section.active { display: block; }

        .team-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--brand-gray); font-size: 0.8rem; }
        .btn-del { color: red; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Zerezes - Rio Sul</h1></header>

    <nav>
        <div class="nav-link active" onclick="switchTab('tab-registro', this)">Registros</div>
        <div class="nav-link" onclick="switchTab('tab-equipe', this)">Equipe</div>
    </nav>

    <div id="tab-registro" class="section active">
        <div class="form-card">
            <div class="form-group"><label>Responsável</label><select id="f-resp"></select></div>
            <div class="form-group"><label>Modelo / Cor</label><input type="text" id="f-modelo" placeholder="Ex: GATTO"></div>
            <div class="form-group">
                <label>Motivo</label>
                <select id="f-motivo" onchange="checkMotivo()">
                    <option value="REPOSIÇÃO LENSES">REPOSIÇÃO LENSES</option>
                    <option value="EMPRÉSTIMO CLIENTE">EMPRÉSTIMO CLIENTE</option>
                    <option value="OUTROS">OUTROS</option>
                </select>
            </div>
            <div id="c-pedido" class="conditional"><label>Nº do Pedido</label><input type="text" id="f-pedido"></div>
            <div id="c-outros" class="conditional"><label>Especifique</label><input type="text" id="f-outros"></div>
            <div class="form-group">
                <label>Status</label>
                <select id="f-status">
                    <option value="FORA (SOLAR)">FORA (SOLAR)</option>
                    <option value="FORA (GRAU)">FORA (GRAU)</option>
                </select>
            </div>
            <button class="btn-black" onclick="salvar()">Registrar Saída</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="render('TUDO', this)">Tudo</button>
            <button class="filter-btn" onclick="render('FORA', this)">Fora</button>
            <button class="filter-btn" onclick="render('RETORNOU', this)">Retornou</button>
        </div>

        <div id="lista-cards"></div>
    </div>

    <div id="tab-equipe" class="section">
        <div class="form-card">
            <label>Novo Integrante</label>
            <div style="display:flex; gap:10px;"><input type="text" id="new-name"><button class="btn-black" style="width:60px; margin:0;" onclick="addEquipe()">ADD</button></div>
        </div>
        <div id="equipe-lista"></div>
    </div>
</div>

<script>
    let db = [];
    let equipe = ["ANA", "CARLOS", "JULIA"];

    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function checkMotivo() {
        const v = document.getElementById('f-motivo').value;
        document.getElementById('c-pedido').style.display = v === 'EMPRÉSTIMO CLIENTE' ? 'block' : 'none';
        document.getElementById('c-outros').style.display = v === 'OUTROS' ? 'block' : 'none';
    }

    function addEquipe() {
        const n = document.getElementById('new-name').value.toUpperCase();
        if(n) { equipe.push(n); document.getElementById('new-name').value=''; updateEquipeUI(); }
    }

    function updateEquipeUI() {
        const sel = document.getElementById('f-resp');
        const list = document.getElementById('equipe-lista');
        sel.innerHTML = '<option value="">Selecione...</option>';
        list.innerHTML = '';
        equipe.forEach((m, i) => {
            sel.innerHTML += `<option value="${m}">${m}</option>`;
            list.innerHTML += `<div class="team-item">${m} <button class="btn-del" onclick="equipe.splice(${i},1);updateEquipeUI()">✕</button></div>`;
        });
    }

    function salvar() {
        const resp = document.getElementById('f-resp').value;
        const mod = document.getElementById('f-modelo').value.toUpperCase();
        const mot = document.getElementById('f-motivo').value;
        const ped = document.getElementById('f-pedido').value;
        const out = document.getElementById('f-outros').value;
        const st = document.getElementById('f-status').value;

        if(!resp || !mod) return alert("Preencha Responsável e Modelo");
        let desc = mot === 'EMPRÉSTIMO CLIENTE' ? `PEDIDO: ${ped}` : (mot === 'OUTROS' ? out.toUpperCase() : mot);
        
        db.unshift({ data: new Date().toLocaleDateString('pt-BR'), resp, mod, desc, st, stOrig: st });
        document.getElementById('f-modelo').value = '';
        render('TUDO');
    }

    function render(f, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const container = document.getElementById('lista-cards');
        container.innerHTML = '';
        
        db.forEach((item, i) => {
            const isFora = item.st.includes("FORA");
            if(f === 'FORA' && !isFora) return;
            if(f === 'RETORNOU' && isFora) return;

            container.innerHTML += `
                <div class="card-item">
                    <div class="card-row"><span class="card-label">Data</span><span class="card-value">${item.data}</span></div>
                    <div class="card-row"><span class="card-label">Responsável</span><span class="card-value">${item.resp}</span></div>
                    <div class="card-row"><span class="card-label">Modelo</span><span class="card-value">${item.mod}</span></div>
                    <div class="card-row"><span class="card-label">Motivo</span><span class="card-value">${item.desc}</span></div>
                    <div class="card-row"><span class="card-label">Status</span><span class="badge ${isFora?'b-fora':'b-retorno'}">${item.st}</span></div>
                    <button class="btn-action" onclick="toggleStatus(${i})">${isFora?'Dar Baixa':'Desfazer Baixa'}</button>
                </div>`;
        });
    }

    function toggleStatus(i) {
        db[i].st = db[i].st.includes("FORA") ? "RETORNOU" : db[i].stOrig;
        render('TUDO');
    }

    updateEquipeUI();
</script>
</body>
</html>
