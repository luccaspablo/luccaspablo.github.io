<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Materiais</title>

<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; }
.container { padding: 20px; max-width: 500px; margin: auto; }
h1 { font-size: 22px; }

.card {
  background: white; padding: 15px; border-radius: 16px;
  margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.2s;
}
.card:active { transform: scale(0.98); }

.header-user {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fff;
  padding: 12px 15px;
  border-radius: 14px;
  margin-bottom: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.header-user h1 { font-size: 20px; margin: 0; }

.btn-trocar {
  background: #e5e5ea;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: bold;
  color: #007aff;
  cursor: pointer;
}

.funcionario { text-align: center; font-weight: 600; cursor: pointer; }
.item { display: flex; justify-content: space-between; align-items: center; }
.controle { display: flex; align-items: center; gap: 10px; }

.btn {
  width: 35px; height: 35px; border-radius: 50%;
  border: none; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.menos { background: #e5e5ea; }
.mais { background: #007aff; color: white; }

.qtd { font-weight: bold; width: 25px; text-align: center; font-size: 18px; }
.ativo { border: 2px solid #34c759; }

.botao {
  width: 100%; padding: 14px; border-radius: 12px;
  border: none; font-size: 16px; margin-top: 10px;
  cursor: pointer; font-weight: 600;
}

.primary { background: #007aff; color: white; }
.secondary { background: #e5e5ea; }
.danger { background: #ff3b30; color: white; }

.status { font-size: 12px; font-weight: bold; margin-top: 5px; }
.pendente { color: #ff9500; }
.concluido { color: #34c759; }

.hidden { display: none; }

.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  background: #34c759; color: white;
  padding: 12px 20px; border-radius: 20px;
  font-size: 14px; opacity: 0; transition: 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; }

.filtros {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.filtro-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #e5e5ea;
  cursor: pointer;
  font-size: 12px;
}

.filtro-btn.active {
  background: #007aff;
  color: white;
}

.btn-delete {
  color: #ff3b30;
  font-size: 12px;
  border: none;
  background: none;
  cursor: pointer;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<!-- TELA INICIAL -->
<div class="container" id="tela1">
  <h1>📦 Controle de Saída ZRZS Rio Sul</h1>
  <button class="botao secondary" onclick="abrirHistorico()">📊 Verificar histórico</button>
  <div id="listaEquipe"></div>
</div>

<!-- TELA ITENS -->
<div class="container" id="tela2" style="display:none;">
  <div class="header-user">
    <span id="textoUsuario"></span>
    <button class="btn-trocar" onclick="voltarInicio()">← Voltar</button>
  </div>

  <h1>Itens</h1>
  <h3>Cases</h3><div id="cases"></div>
  <h3>Flanelas</h3><div id="flanelas"></div>
  <h3>Ecobags</h3><div id="ecobags"></div>

  <button class="botao primary" onclick="goResumo()">Finalizar Retirada</button>
  <button class="botao secondary" onclick="limparTudo()">Limpar Tudo</button>
</div>

<!-- RESUMO -->
<div class="container" id="tela3" style="display:none;">
  <h1>Resumo</h1>
  <div id="resumo" class="card"></div>
  <button class="botao primary" onclick="save()">Confirmar e Salvar</button>
  <button class="botao secondary" onclick="back()">Voltar</button>
</div>

<!-- HISTÓRICO -->
<div class="container" id="tela4" style="display:none;">

  <div class="header-user">
    <h1>Histórico</h1>
    <button class="btn-trocar" onclick="abrirRelatorio()">📊 Relatório</button>
  </div>

  <div id="listaHistorico"></div>

  <button class="botao secondary" onclick="voltarInicio()">Voltar</button>
</div>

<!-- RELATÓRIO -->
<div class="container" id="tela5" style="display:none;">
  <h1>Relatório</h1>

  <div class="filtros">
    <button class="filtro-btn active" onclick="setFiltro('hoje', this)">Hoje</button>
    <button class="filtro-btn" onclick="setFiltro('7', this)">7d</button>
    <button class="filtro-btn" onclick="setFiltro('30', this)">30d</button>
    <button class="filtro-btn" onclick="setFiltro('all', this)">Todos</button>
  </div>

  <div id="relatorio"></div>

  <button class="botao secondary" onclick="voltarHistorico()">Voltar</button>
</div>

<script>
let user = "";
let data = {};
let filtroAtual = "hoje";

const equipe = {
  "Assistentes": ['Andressa', 'Gabriela', 'Isa'],
  "Consultores": ['Ana', 'André', 'Caio', 'Daniele', 'Josi', 'Lucas', 'Matheus', 'Nathalia'],
  "Gerente": ['Suzana']
};

const items = {
  "Cases": ["Case Archt", "Case Cuore P", "Case Cuore G", "Case Stahl"],
  "Flanelas": ["Flanela Cuore Grau", "Flanela Cuore Solar", "Flanela Verão", "Flanela Archt"],
  "Ecobags": ["Ecobag Verão", "Ecobag Amarela", "Ecobag Cinza"]
};

function safeId(item){ return item.replace(/\s/g,''); }

function showToast(msg,color="#34c759"){
  const t=document.getElementById("toast");
  t.style.background=color;
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function init(){
  for(let cargo in equipe){
    let html=`<h3>${cargo}</h3>`;
    equipe[cargo].forEach(n=>{
      html+=`<div class="card funcionario" onclick="selectUser('${n}')">${n}</div>`;
    });
    listaEquipe.innerHTML+=html;
  }
}

function selectUser(n){
  user=n; data={};
  tela1.style.display="none";
  tela2.style.display="block";
  textoUsuario.innerText="Olá, "+user+" ::)";
  renderItems();
}

function voltarInicio(){
  user=""; data={};
  tela2.style.display="none";
  tela3.style.display="none";
  tela4.style.display="none";
  tela5.style.display="none";
  tela1.style.display="block";
}

function renderItems(){
  for(let cat in items){
    let container=document.getElementById(cat.toLowerCase());
    container.innerHTML="";
    items[cat].forEach(item=>{
      if(!data[item]) data[item]=0;
      let id=safeId(item);

      container.innerHTML+=`
      <div class="card item ${data[item]>0?'ativo':''}">
        <span>${item}</span>
        <div class="controle">
          <button class="btn menos" onclick="change('${item}',-1)">−</button>
          <div class="qtd" id="val-${id}">${data[item]}</div>
          <button class="btn mais" onclick="change('${item}',1)">+</button>
        </div>
      </div>`;
    });
  }
}

function change(item,val){
  let id=safeId(item);
  if(data[item]+val>=0){
    data[item]+=val;
    document.getElementById("val-"+id).innerText=data[item];
    let card=document.getElementById("val-"+id).closest(".card");
    data[item]>0?card.classList.add("ativo"):card.classList.remove("ativo");
  }
}

function limparTudo(){
  for(let k in data) data[k]=0;
  renderItems();
}

function goResumo(){
  if(!Object.values(data).some(v=>v>0)){
    showToast("Selecione ao menos um item","#ff3b30");
    return;
  }
  tela2.style.display="none";
  tela3.style.display="block";

  let html=`<p><b>${user}</b></p><hr>`;
  for(let i in data) if(data[i]>0) html+=`<p>${i}: ${data[i]}</p>`;
  resumo.innerHTML=html;
}

function save(){
  let r=JSON.parse(localStorage.getItem("registros"))||[];
  r.unshift({user,data:{...data},date:new Date().toISOString(),status:"pendente"});
  localStorage.setItem("registros",JSON.stringify(r));
  showToast("Salvo!");
  setTimeout(()=>voltarInicio(),800);
}

function abrirHistorico(){
  tela1.style.display="none";
  tela4.style.display="block";
  renderHistorico();
}

function renderHistorico(){
  let registros = JSON.parse(localStorage.getItem("registros")) || [];
  listaHistorico.innerHTML = "";

  if (registros.length === 0) {
    listaHistorico.innerHTML = "<p>Nenhum registro.</p>";
    return;
  }

  registros.forEach((reg, i) => {
    let itens = "";
    for (let k in reg.data) {
      if (reg.data[k] > 0) itens += `<li>${k}: ${reg.data[k]}</li>`;
    }

    listaHistorico.innerHTML += `
      <div class="card">
        <div onclick="document.getElementById('d${i}').classList.toggle('hidden')" style="cursor:pointer">
          <b>${reg.user}</b>
          <div class="status ${reg.status === 'concluido' ? 'concluido' : 'pendente'}">
            ${reg.status.toUpperCase()}
          </div>
        </div>

        <div id="d${i}" class="hidden">
          <ul>${itens}</ul>

          ${reg.status === "pendente" 
            ? `<button class="botao primary" onclick="concluir(${i})">Concluir</button>` 
            : ""}

          <button class="btn-delete" onclick="deletar(${i})">🗑️ Excluir registro</button>
        </div>
      </div>`;
  });
}

function concluir(i){
  let r=JSON.parse(localStorage.getItem("registros"));
  r[i].status="concluido";
  localStorage.setItem("registros",JSON.stringify(r));
  renderHistorico();
  showToast("Concluído");
}

function deletar(i){
  if(confirm("Excluir?")){
    let r=JSON.parse(localStorage.getItem("registros"));
    r.splice(i,1);
    localStorage.setItem("registros",JSON.stringify(r));
    renderHistorico();
    showToast("Removido","#ff3b30");
  }
}

function abrirRelatorio(){
  tela4.style.display="none";
  tela5.style.display="block";
  gerarRelatorio();
}

function voltarHistorico(){
  tela5.style.display="none";
  tela4.style.display="block";
}

function setFiltro(tipo,el){
  filtroAtual=tipo;
  document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  gerarRelatorio();
}

function gerarRelatorio(){
  let r=JSON.parse(localStorage.getItem("registros"))||[];
  let now=new Date();

  let filtrados=r.filter(reg=>{
    let d=new Date(reg.date);
    if(filtroAtual==="hoje") return d.toDateString()===now.toDateString();
    if(filtroAtual==="7") return (now-d)/(1000*60*60*24)<=7;
    if(filtroAtual==="30") return (now-d)/(1000*60*60*24)<=30;
    return true;
  });

  let html="";

  for(let cat in items){
    let total={};
    items[cat].forEach(i=>total[i]=0);

    filtrados.forEach(reg=>{
      for(let i in reg.data){
        if(total[i]!=undefined) total[i]+=reg.data[i];
      }
    });

    let ordenado=Object.entries(total).sort((a,b)=>b[1]-a[1]);

    html+=`<div class="card"><h3>${cat}</h3>`;
    ordenado.forEach(([nome,qtd])=>{
      if(qtd>0) html+=`<p>${nome}: <b>${qtd}</b></p>`;
    });
    html+="</div>";
  }

  relatorio.innerHTML = html || "<p>Nada no período</p>";
}

function back(){
  tela3.style.display="none";
  tela2.style.display="block";
}

init();
</script>

</body>
</html>
