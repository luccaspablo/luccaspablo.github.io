<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerezes - Gestão de Externos v4.1</title>
    <style>
        :root {
            --brand-black: #000000;
            --brand-gray: #f2f2f2;
            --accent-green: #d4edda;
            --accent-text-green: #155724;
            --border-color: #e0e0e0;
            --text-main: #222;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            letter-spacing: 0.5px;
        }

        .container { 
            max-width: 100%; /* Permite que a tabela ocupe toda a largura da tela */
            margin: 0 auto; 
            overflow-x: auto; /* Adiciona barra de rolagem horizontal se necessário */
        }

        header {
            border-bottom: 2px solid var(--brand-black);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        header h1 { text-transform: uppercase; font-weight: 900; font-size: 1.5rem; margin: 0; }

        /* FORMULÁRIO */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--brand-gray);
            padding: 20px;
            border-radius: 4px;
            width: 100%;
        }

        .conditional-field {
            display: none;
            background: #e9e9e9;
            padding: 10px;
            border-left: 3px solid var(--brand-black);
            grid-column: 1 / -1;
        }

        label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            background: white;
            font-size: 0.9rem;
        }

        .btn-main {
            background: var(--brand-black);
            color: white;
            border: none;
            padding: 15px 30px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        /* TABELA E FILTROS */
        .filters { display: flex; gap: 10px; margin: 40px 0 15px 0; }
        
        .filter-btn {
            background: var(--brand-gray);
            border: none;
            padding: 8px 15px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .filter-btn.active { background: var(--brand-black); color: white; }

        .table-wrapper { width: 100%; }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: auto; /* Permite que a tabela se adapte ao conteúdo */
        }

        th { text-align: left; font-size: 0.7rem; text-transform: uppercase; padding: 15px 10px; border-bottom: 1px solid var(--brand-black); white-space: nowrap; /* Impede que o texto do cabeçalho quebre */ }
        td { padding: 15px 10px; border-bottom: 1px solid var(--brand-gray); font-size: 0.85rem; word-wrap: break-word; /* Quebra o texto se necessário */ }

        .badge { font-size: 0.65rem; padding: 4px 8px; text-transform: uppercase; font-weight: bold; }
        .b-fora { background: #fee2e2; color: #991b1b; }
        .b-retorno { background: var(--accent-green); color: var(--accent-text-green); }

        .btn-action {
            border: 1px solid var(--brand-black);
            background: none;
            font-size: 0.7rem;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-undo { border-color: #999; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Zerezes <span style="font-weight:300; font-size:0.9rem;">| Gestão de Externos</span></h1></header>

    <div class="form-grid">
        <div>
            <label>Responsável</label>
            <select id="select-func">
                <option value="">Selecione...</option>
                <option value="ANA">ANA</option>
                <option value="CARLOS">CARLOS</option>
                <option value="JULIA">JULIA</option>
            </select>
        </div>
        <div>
            <label>Modelo / Cor</label>
            <input type="text" id="input-modelo" placeholder="Ex: GATTO - TARTARUGA">
        </div>
        <div>
            <label>Motivo</label>
            <select id="select-motivo" onchange="toggleFields()">
                <option value="REPOSIÇÃO LENTES">REPOSIÇÃO LENTES</option>
                <option value="EMPRÉSTIMO CLIENTE">EMPRÉSTIMO CLIENTE</option>
                <option value="OUTROS">OUTROS</option>
            </select>
        </div>
        
        <div id="field-pedido" class="conditional-field">
            <label>Nº do Pedido (Obrigatório)</label>
            <input type="text" id="input-pedido" placeholder="Digite o número do pedido">
        </div>

        <div id="field-outros" class="conditional-field">
            <label>Especifique o Motivo (Obrigatório)</label>
            <input type="text" id="input-outros" placeholder="Descreva o motivo da saída">
        </div>

        <div>
            <label>Status</label>
            <select id="select-status">
                <option value="FORA (SOLAR)">FORA (SOLAR)</option>
                <option value="FORA (GRAU)">FORA (GRAU)</option>
            </select>
        </div>
        <div>
            <label>&nbsp;</label> <button class="btn-main" onclick="registrar()">Registrar</button>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterTable('TUDO')">TUDO</button>
        <button class="filter-btn" onclick="filterTable('FORA')">FORA</button>
        <button class="filter-btn" onclick="filterTable('RETORNOU')">RETORNOU</button>
    </div>

    <div class="table-wrapper">
        <table id="main-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Responsável</th>
                    <th>Modelo</th>
                    <th>Motivo</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let registros = [];

    function toggleFields() {
        const motivo = document.getElementById('select-motivo').value;
        document.getElementById('field-pedido').style.display = (motivo === 'EMPRÉSTIMO CLIENTE') ? 'block' : 'none';
        document.getElementById('field-outros').style.display = (motivo === 'OUTROS') ? 'block' : 'none';
    }

    function registrar() {
        const resp = document.getElementById('select-func').value;
        const mod = document.getElementById('input-modelo').value.toUpperCase();
        const mot = document.getElementById('select-motivo').value;
        const pedido = document.getElementById('input-pedido').value.trim();
        const outros = document.getElementById('input-outros').value.trim();
        const st = document.getElementById('select-status').value;
        const data = new Date().toLocaleDateString('pt-BR');

        if (!resp) { alert("Selecione um funcionário!"); return; }
        if (!mod) { alert("Digite o modelo!"); return; }

        let detalheFinal = mot;
        if (mot === 'EMPRÉSTIMO CLIENTE') {
            if (!pedido) { alert("O número do pedido é obrigatório para empréstimos!"); return; }
            detalheFinal = `PEDIDO: ${pedido}`;
        }
        if (mot === 'OUTROS') {
            if (!outros) { alert("Por favor, especifique o motivo em 'Outros'!"); return; }
            detalheFinal = outros.toUpperCase();
        }

        registros.unshift({ 
            data, 
            responsavel: resp, 
            modelo: mod, 
            motivo: detalheFinal, 
            status: st,
            statusOriginal: st 
        });

        document.getElementById('input-modelo').value = '';
        document.getElementById('input-pedido').value = '';
        document.getElementById('input-outros').value = '';
        renderTable('TUDO');
    }

    function renderTable(filter) {
        const body = document.getElementById('table-body');
        body.innerHTML = '';

        registros.forEach((reg, index) => {
            const isFora = reg.status.includes("FORA");
            if (filter === 'FORA' && !isFora) return;
            if (filter === 'RETORNOU' && isFora) return;

            const badgeClass = isFora ? 'b-fora' : 'b-retorno';
            const actionBtn = isFora 
                ? `<button class="btn-action" onclick="alterarStatus(${index}, 'RETORNOU')">BAIXA</button>` 
                : `<button class="btn-action btn-undo" onclick="alterarStatus(${index}, '${reg.statusOriginal}')">DESFAZER</button>`;

            body.innerHTML += `
                <tr>
                    <td>${reg.data}</td>
                    <td>${reg.responsavel}</td>
                    <td>${reg.modelo}</td>
                    <td>${reg.motivo}</td>
                    <td><span class="badge ${badgeClass}">${reg.status}</span></td>
                    <td>${actionBtn}</td>
                </tr>`;
        });
    }

    function alterarStatus(index, novoStatus) {
        registros[index].status = novoStatus;
        renderTable('TUDO');
    }

    function filterTable(type) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderTable(type);
    }
</script>

</body>
</html>
